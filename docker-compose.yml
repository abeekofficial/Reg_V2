version: "3.9"

services:
  # ── Telegram Bot ──────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: regbot
    restart: unless-stopped
    env_file:
      - ./bot/.env.production
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis # container nomi bo'yicha murojaat
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - bot_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: regbot_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data: # Redis ma'lumotlari (restart bo'lsa yo'qolmaydi)
  bot_logs: # Bot log fayllari
